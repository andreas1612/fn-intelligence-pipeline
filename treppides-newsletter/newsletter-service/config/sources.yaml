# Machine-readable source registry (verified live 2026-07-23).
# category: authority | journal   (drives the two hub sections + urgency cap)
# kind: rss (scrapers added in Phase F1)
# Only feeds that resolved to valid RSS are enabled here. IFRS/OECD block bots
# and need a browser UA or a scraper - deferred.
#
# Human-readable register with the full source list: ../../sources.md

sources:
  - key: cysec
    name: CySEC
    category: authority
    kind: scrape
    sections:
      - url: https://www.cysec.gov.cy/en-GB/public-info/announcements/
        pages: 2
      - url: https://www.cysec.gov.cy/en-GB/public-info/circulars/general/
        pages: 1
      - url: https://www.cysec.gov.cy/en-GB/public-info/policy-statements/
        pages: 1
    # Useful but JS-rendered (no items in a plain GET) - need a headless browser:
    #   Consultation Papers, Board Decisions, Administrative Sanctions, Court
    #   Decisions, Warnings. Statistical Publications / Seminars / Certifications
    #   and all of Regulated Entities + Regulatory Framework are static reference,
    #   not news - intentionally excluded.

  - key: cy_tax
    name: Cyprus Tax Department
    category: authority
    kind: scrape
    urls:
      - https://www.mof.gov.cy/mof/tax/taxdep.nsf/page02_en/page02_en?opendocument

  - key: cbc
    name: Central Bank of Cyprus
    category: authority
    kind: scrape
    scraper: html_list
    url: https://www.centralbank.cy/en/announcements
    verify: false
    limit: 30
    item_selector: "div.announcement-list:not(.displaymob)"
    title_selector: "h5"
    link_selector: "a"
    date_selector: "span.date"
    date_format: "%d %B %Y"

  - key: registrar
    name: Registrar of Companies
    category: authority
    kind: scrape
    scraper: html_list
    url: https://www.companies.gov.cy/en/news
    verify: false
    limit: 30
    item_selector: "article.item-box"
    title_selector: "h2 a"
    link_selector: "h2 a"
    date_attr_selector: "time"
    summary_selector: "summary"
    min_year: 2024

  # Deferred scraper sources (need more than a plain GET, revisit later):
  #  - MOKAS (FIU): returns an error/empty body to a plain GET (JS or blocked).
  #  - ICPAC: homepage is JS-rendered; no static news listing found.
  #  - Cyprus DPA (dataprotection.gov.cy): Domino views 500 on GET.
  #  - EUR-Lex OJ: RSS paths return 0 entries; needs the OJ web-service/API.
  # All would need a headless browser or a proper API integration.

  - key: esma
    name: ESMA
    category: authority
    kind: rss
    url: https://www.esma.europa.eu/rss.xml

  - key: eba
    name: EBA
    category: authority
    kind: rss
    url: https://www.eba.europa.eu/news-press/news/rss.xml

  - key: edpb
