    url: https://digital-strategy.ec.europa.eu/en/rss.xml

  - key: eiopa
    name: EIOPA
    category: authority
    kind: rss
    url: https://www.eiopa.europa.eu/node/4816/rss_en

  - key: ecb_ssm
    name: ECB Banking Supervision (SSM)
    category: authority
    kind: rss
    url: https://www.bankingsupervision.europa.eu/rss/press.html

  - key: ncsc_uk
    name: NCSC UK
