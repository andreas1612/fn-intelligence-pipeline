name: Collect Wave 1 sources

on:
  schedule:
    # Daily at 06:00 UTC. Adjust cadence here if collection frequency needs to change.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

# One collection run at a time (D-025). A scheduled run overlapping a manual
# dispatch would race on the finalogic.db commit; the loser's push would fail
# and its collected items would be lost. Queued, not cancelled: both runs
# still happen, just in sequence.
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collectors
        id: collect
        continue-on-error: true
        run: python -m src.run

      - name: Commit database if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add finalogic.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Collect: update finalogic.db"
            # Rebase onto anything pushed since checkout (D-025). A conflict on
            # the binary fails the job loudly rather than losing data silently.
            git pull --rebase origin main
            git push
          fi

      - name: Fail job if a collector reported a health issue
        if: steps.collect.outcome == 'failure'
        run: exit 1
